name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Oldest supported (engines: >=20) and current.
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: benchmarks/fixture/package-lock.json
      - run: npm ci
        working-directory: benchmarks/fixture
      - run: npm test
        working-directory: benchmarks/fixture
      - run: npm run typecheck
        working-directory: benchmarks/fixture
